services:
  preview:
    build:
      context: .
      args:
        HUGO_VERSION: 0.163.3
    command:
      - hugo
      - server
      - --bind
      - 0.0.0.0
      - --baseURL
      - http://localhost:1313/
      - -D
      - --disableFastRender
    environment:
      HUGO_BASEURL: ${HUGO_BASEURL:-http://localhost:1313/}
      HUGO_ENVIRONMENT: ${HUGO_ENVIRONMENT:-development}
      HUGO_CACHEDIR: ${HUGO_CACHEDIR:-/tmp/hugo_cache}
      GIT_HTTP_VERSION: ${GIT_HTTP_VERSION:-HTTP/1.1}
    ports:
      - "1313:1313"
    volumes:
      - .:/src

  build:
    build:
      context: .
      args:
        HUGO_VERSION: 0.163.3
    command:
      - hugo
      - --minify
    environment:
      HUGO_BASEURL: ${HUGO_BASEURL:-https://example.com/}
      HUGO_ENVIRONMENT: production
      HUGO_CACHEDIR: ${HUGO_CACHEDIR:-/tmp/hugo_cache}
      GIT_HTTP_VERSION: ${GIT_HTTP_VERSION:-HTTP/1.1}
    volumes:
      - .:/src
