<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Hello World Banner</title>
  <desc id="desc">A lightweight banner for the sample Hugo post.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="24"/>
  <circle cx="980" cy="140" r="84" fill="#93c5fd" fill-opacity="0.35"/>
  <circle cx="1035" cy="210" r="36" fill="#dbeafe" fill-opacity="0.8"/>
  <text x="96" y="250" fill="#eff6ff" font-size="72" font-family="Georgia, serif">Hello World</text>
  <text x="96" y="330" fill="#bfdbfe" font-size="34" font-family="Verdana, sans-serif">Hugo prototype with versioned content, theme modules and CI/CD</text>
</svg>
