baseURL: https://example.com/
defaultContentLanguageInSubdir: false
title: Blog
defaultContentLanguage: zh
languages:
  zh:
    label: 简体中文
    locale: zh-CN
    weight: 1
hasCJKLanguage: true
enableRobotsTXT: true
enableEmoji: true
summaryLength: 42

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

permalinks:
  posts: /posts/:year/:month/:slug/

taxonomies:
  tag: tags
  category: categories

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: about
      name: 关于
      url: /about/
      weight: 20

params:
  env: production
  description: 一个基于 Hugo Module 构建的个人博客原型。
  author: Blog Owner
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  displayFullLangName: true
  disableSpecial1stPost: true
  mainSections:
    - posts
  socialIcons:
    - name: github
      url: https://github.com/example
    - name: rss
      url: /index.xml
  homeInfoParams:
    Title: 个人博客原型
    Content: |
      这个仓库使用 Hugo + PaperMod + GitHub Pages 组织内容、样式与自动化部署。
      内容与主题配置分离，方便长期维护和迁移。
  codeLicense:
    name: MIT
    url: /LICENSE
  contentLicense:
    name: CC BY-SA 4.0
    url: https://creativecommons.org/licenses/by-sa/4.0/

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
