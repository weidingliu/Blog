baseURL: https://blog.lwd123.cc/
defaultContentLanguageInSubdir: false
title: lwd的调试笔记
defaultContentLanguage: zh
languages:
  zh:
    label: 简体中文
    locale: zh-CN
    weight: 1
hasCJKLanguage: true
enableRobotsTXT: true
enableEmoji: true
summaryLength: 42

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

permalinks:
  posts: /posts/:year/:month/:slug/

taxonomies:
  tag: tags
  category: categories

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: about
      name: Abort
      url: /about/
      weight: 20

params:
  env: production
  description: 做一些有趣的事情吧！
  author: weidingliu
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  displayFullLangName: true
  disableSpecial1stPost: true
  mainSections:
    - posts
  socialIcons:
    - name: github
      url: https://github.com/weidingliu
    - name: rss
      url: /index.xml
  homeInfoParams:
    Title: lwd的调试笔记
    Content: |
      做一些有趣的事情吧！

      选择分类：
      - [CPU](/categories/cpu/)
      - [FPGA](/categories/fpga/)
  codeLicense:
    name: MIT
    url: /LICENSE
  contentLicense:
    name: CC BY-SA 4.0
    url: https://creativecommons.org/licenses/by-sa/4.0/

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
